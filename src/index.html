<!DOCTYPE html>
<html dir="ltr" lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>NAPMap - Stanice alternatívnych palív</title>

    <script type="module" src="/build/napmap-ufe.esm.js"></script>
    <script nomodule src="/build/napmap-ufe.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="napmap-root"></div>
    <script>
      (function () {
        var host = window.location.hostname;
        var isLocalDev = /^(localhost|127\.|::1|0\.0\.0\.0)$/.test(host) || host === '';
        var apiBase = isLocalDev ? 'http://localhost:5001/api' : '/api';
        var root = document.getElementById('napmap-root');
        root.innerHTML =
          '<mb-napmap-app api-base="' + apiBase + '" base-path="/"></mb-napmap-app>';
      })();
    </script>
  </body>
</html>
